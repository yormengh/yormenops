name: Lambda — Build, Scan & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - '.github/workflows/lambda.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lambda/**'

env:
  AWS_REGION:   us-east-2
  NODE_VERSION: "20"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lambda/package-lock.json
      - run: npm ci
      - run: npx eslint src --ext .js --max-warnings 0 || true

  # ── Build & Scan ──────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build, Scan & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Lambda zip
        working-directory: lambda
        run: |
          npm ci --production --prefer-offline
          zip -r lambda.zip src/ node_modules/ package.json \
            --exclude "*.test.js" --exclude "src/local.js"
          echo "Lambda zip size: $(du -sh lambda.zip | cut -f1)"

      - name: Build MongoDB Layer zip
        run: |
          cd lambda/layers/mongodb/nodejs
          npm ci --prefer-offline
          cd ..
          zip -r mongodb-layer.zip nodejs/
          mv mongodb-layer.zip ../../../lambda/mongodb-layer.zip
          echo "Layer zip size: $(du -sh lambda/mongodb-layer.zip | cut -f1)"

      - name: Build & push Lambda container image to ECR
        working-directory: lambda
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/yormenops/lambda:${IMAGE_TAG}"

          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$FULL_IMAGE" \
            -f - . <<'DOCKERFILE'
          FROM public.ecr.aws/lambda/nodejs:20
          COPY package.json package-lock.json ./
          RUN npm ci --omit=dev
          COPY src ./src
          CMD ["src/handlers/index.handler"]
          DOCKERFILE

          docker push "$FULL_IMAGE"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Scan Lambda image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/yormenops/lambda:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Deploy Lambda functions
        working-directory: lambda
        run: |
          for FUNC in yormenops-posts yormenops-comments yormenops-health yormenops-seed; do
            echo "Updating $FUNC..."
            aws lambda update-function-code \
              --function-name "$FUNC" \
              --zip-file fileb://lambda.zip \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager
            aws lambda wait function-updated \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }}
          done

          # Publish updated layer
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name yormenops-mongodb-layer \
            --zip-file fileb://mongodb-layer.zip \
            --compatible-runtimes nodejs20.x \
            --region ${{ env.AWS_REGION }} \
            --query 'LayerVersionArn' \
            --output text \
            --no-cli-pager)

          echo "New layer ARN: $LAYER_ARN"
          echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_ENV

      - name: Attach new layer to Lambda functions
        run: |
          for FUNC in yormenops-posts yormenops-comments yormenops-health yormenops-seed; do
            aws lambda update-function-configuration \
              --function-name "$FUNC" \
              --layers "${{ env.LAYER_ARN }}" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager \
              --query 'FunctionName' --output text
            # Wait for update to complete before moving to next function
            aws lambda wait function-updated \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }}
          done

      - name: Set Lambda environment variables
        run: |
          cat > /tmp/lambda-env.json << EOF
          {
            "Variables": {
              "NODE_ENV": "prod",
              "MONGODB_URI": "${{ secrets.MONGODB_URI }}",
              "CORS_ORIGIN": "${{ secrets.CORS_ORIGIN }}",
              "AWS_NODEJS_CONNECTION_REUSE_ENABLED": "1"
            }
          }
          EOF
          for FUNC in yormenops-posts yormenops-comments yormenops-health yormenops-seed; do
            aws lambda update-function-configuration \
              --function-name "$FUNC" \
              --environment "file:///tmp/lambda-env.json" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager \
              --query 'FunctionName' --output text
          done

      - name: Deploy summary
        run: |
          echo "## 🛸 YormenOps Lambda Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | \`us-east-2\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | posts, comments, health, seed |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
