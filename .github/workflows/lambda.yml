name: Lambda — Build, Scan & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - '.github/workflows/lambda.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lambda/**'
  workflow_dispatch:

env:
  AWS_REGION:   us-east-2
  NODE_VERSION: "20"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lambda/package-lock.json
      - run: npm ci
      - run: npx eslint src --ext .js --max-warnings 0 || true

  # ── Build & Scan ──────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build, Scan & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build Lambda zip
        working-directory: lambda
        run: |
          npm ci --production --prefer-offline
          zip -r lambda.zip src/ node_modules/ package.json \
            --exclude "*.test.js" --exclude "src/local.js"
          echo "Lambda zip size: $(du -sh lambda.zip | cut -f1)"

      - name: Build MongoDB Layer zip
        run: |
          # Create proper Lambda layer structure: nodejs/node_modules/
          mkdir -p lambda/layer-tmp/nodejs
          
          # Copy layer contents - adjust path based on your layer structure
          if [ -d "lambda/layers/mongodb" ]; then
            cp -r lambda/layers/mongodb/* lambda/layer-tmp/nodejs/ 2>/dev/null || true
          fi
          
          # Install dependencies if package.json exists in layer
          if [ -f "lambda/layer-tmp/nodejs/package.json" ]; then
            cd lambda/layer-tmp/nodejs
            npm ci --omit=dev --prefer-offline
            cd ../../..
          fi
          
          # Create the zip
          cd lambda/layer-tmp
          zip -r ../mongodb-layer.zip nodejs/
          cd ../..
          
          echo "Layer zip size: $(du -sh lambda/mongodb-layer.zip | cut -f1)"

      - name: Build & push Lambda container image to ECR
        working-directory: lambda
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/yormenops/lambda:${IMAGE_TAG}"

          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$FULL_IMAGE" \
            -f - . <<'DOCKERFILE'
          FROM public.ecr.aws/lambda/nodejs:20
          COPY package.json package-lock.json ./
          RUN npm ci --omit=dev
          COPY src ./src
          CMD ["src/handlers/index.handler"]
          DOCKERFILE

          docker push "$FULL_IMAGE"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Scan Lambda image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/yormenops/lambda:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
          skip-files: "trivy-results.sarif"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Generate Lambda environment configuration
        run: |
          # Validate secrets exist
          if [ -z "${{ secrets.MONGODB_URI }}" ]; then
            echo "⚠️ Warning: MONGODB_URI secret is empty"
          fi
          
          # Generate valid JSON with proper escaping
          jq -n \
            --arg mongo "${{ secrets.MONGODB_URI }}" \
            --arg cors "${{ secrets.CORS_ORIGIN }}" \
            '{
              Variables: {
                NODE_ENV: "prod",
                MONGODB_URI: $mongo,
                CORS_ORIGIN: $cors,
                AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
              }
            }' > /tmp/lambda-env.json
          
          echo "Environment configuration generated:"
          cat /tmp/lambda-env.json | jq '.'  # Pretty print for debug
          
          # Validate JSON is well-formed
          if ! jq empty /tmp/lambda-env.json 2>/dev/null; then
            echo "❌ Invalid JSON generated"
            exit 1
          fi

      - name: Deploy all Lambda updates
        run: |
          # Publish new layer version
          echo "📦 Publishing new layer version..."
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name yormenops-mongodb-layer \
            --zip-file fileb://lambda/mongodb-layer.zip \
            --compatible-runtimes nodejs20.x \
            --query 'LayerVersionArn' \
            --output text)
          
          echo "✅ New layer ARN: $LAYER_ARN"
          
          # Update all functions with code, layer, and environment variables
          FUNCTIONS="yormenops-posts yormenops-comments yormenops-health yormenops-seed"
          
          for FUNC in $FUNCTIONS; do
            echo ""
            echo "🚀 Updating $FUNC..."
            
            # Update function code
            echo "  → Updating code..."
            aws lambda update-function-code \
              --function-name "$FUNC" \
              --zip-file fileb://lambda/lambda.zip \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager \
              --query 'FunctionName' --output text
            
            # Update configuration (layer + environment variables)
            echo "  → Updating configuration (layer + env)..."
            aws lambda update-function-configuration \
              --function-name "$FUNC" \
              --layers "$LAYER_ARN" \
              --environment file:///tmp/lambda-env.json \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager \
              --query 'FunctionName' --output text
            
            # Wait for update to complete
            echo "  → Waiting for update to complete..."
            aws lambda wait function-updated \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }}
            
            echo "  ✅ $FUNC successfully updated"
          done
          
          echo ""
          echo "🎉 All functions deployed successfully!"

      - name: Verify deployments
        run: |
          echo "🔍 Verifying deployments..."
          FUNCTIONS="yormenops-posts yormenops-comments yormenops-health yormenops-seed"
          
          for FUNC in $FUNCTIONS; do
            echo ""
            echo "Checking $FUNC:"
            
            # Get function configuration
            CONFIG=$(aws lambda get-function-configuration \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }} \
              --query '{Runtime: Runtime, MemorySize: MemorySize, Timeout: Timeout, Layers: Layers[0].Arn, Environment: Environment.Variables}' \
              --output json)
            
            echo "$CONFIG" | jq '.'
            
            # Verify environment variables are set (without exposing values)
            HAS_MONGO=$(echo "$CONFIG" | jq -r '.Environment.MONGODB_URI != null')
            HAS_CORS=$(echo "$CONFIG" | jq -r '.Environment.CORS_ORIGIN != null')
            
            if [ "$HAS_MONGO" = "true" ]; then
              echo "  ✓ MONGODB_URI is configured"
            else
              echo "  ✗ MONGODB_URI is missing"
            fi
            
            if [ "$HAS_CORS" = "true" ]; then
              echo "  ✓ CORS_ORIGIN is configured"
            else
              echo "  ✗ CORS_ORIGIN is missing"
            fi
          done

      - name: Deploy summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🛸 YormenOps Lambda Deploy
          
          | Field | Value |
          |-------|-------|
          | Image Tag | `${{ env.IMAGE_TAG }}` |
          | Region | `us-east-2` |
          | Functions | posts, comments, health, seed |
          | Layer | MongoDB connection layer |
          | Status | ✅ Deployed successfully |
          
          ### Environment Configuration
          - NODE_ENV: `prod`
          - MONGODB_URI: ✅ Configured
          - CORS_ORIGIN: ✅ Configured
          - AWS_NODEJS_CONNECTION_REUSE_ENABLED: `1`
          
          ### Deployment Details
          - All functions updated with latest code
          - New layer version published and attached
          - Environment variables securely injected
          - Container image scanned with Trivy
          
          🚀 Ready for production traffic!
          EOF

      - name: Rollback on failure (optional)
        if: failure()
        run: |
          echo "⚠️ Deployment failed, but no automatic rollback configured"
          echo "Please check the logs and manually rollback if needed"
          echo ""
          echo "To rollback to previous version:"
          echo "  aws lambda list-versions-by-function --function-name <FUNC>"
          echo "  aws lambda update-function-code --function-name <FUNC> --zip-file fileb://previous.zip"

          