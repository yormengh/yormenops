name: Lambda — Build, Scan & Deploy

on:
  push:
    branches: [main]
    paths:
      - "lambda/**"
      - ".github/workflows/lambda.yml"
  pull_request:
    branches: [main]
    paths:
      - "lambda/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  NODE_VERSION: "20"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lambda/package-lock.json
      - run: npm ci
      - run: npx eslint src --ext .js --max-warnings 0 || true

  # ── Build & Scan ──────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build, Scan & Deploy to Lambda
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build Lambda zip
        working-directory: lambda
        run: |
          npm ci --production --prefer-offline
          zip -r lambda.zip src/ node_modules/ package.json \
            --exclude "*.test.js" --exclude "src/local.js"
          echo "Lambda zip size: $(du -sh lambda.zip | cut -f1)"

      - name: Build MongoDB Layer zip
        run: |
          cd lambda/layers/mongodb/nodejs
          npm ci --prefer-offline
          cd ..
          zip -r mongodb-layer.zip nodejs/
          mv mongodb-layer.zip ../../../lambda/mongodb-layer.zip
          echo "Layer zip size: $(du -sh lambda/mongodb-layer.zip | cut -f1)"

      - name: Build & push Lambda container image to ECR (for scanning only)
        working-directory: lambda
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/yormenops/lambda:${IMAGE_TAG}"

          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$FULL_IMAGE" \
            -f - . <<'DOCKERFILE'
          FROM public.ecr.aws/lambda/nodejs:20
          COPY package.json package-lock.json ./
          RUN npm ci --omit=dev
          COPY src ./src
          CMD ["src/handlers/index.handler"]
          DOCKERFILE

          docker push "$FULL_IMAGE"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV

      - name: Scan Lambda image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Generate Lambda environment configuration
        run: |
          if [ -z "${{ secrets.MONGODB_URI }}" ]; then
            echo "⚠️ Warning: MONGODB_URI secret is empty"
          fi
          jq -n \
          --arg mongo "${{ secrets.MONGODB_URI }}" \
          --arg cors "${{ secrets.CORS_ORIGIN }}" \
          --arg seed_token "${{ secrets.SEED_TOKEN }}" \
          '{
          Variables: {
          NODE_ENV: "prod",
          MONGODB_URI: $mongo,
          CORS_ORIGIN: $cors,
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1",
          SEED_TOKEN: $seed_token
          }
          }' > /tmp/lambda-env.json

          echo "✅ Environment configuration generated"

          if ! jq empty /tmp/lambda-env.json 2>/dev/null; then
            echo "❌ Invalid JSON generated"
            exit 1
          fi

      - name: Deploy Lambda functions (ZIP + Layer)
        working-directory: lambda
        run: |
          set -e

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Publishing new layer version"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name yormenops-mongodb-layer \
            --zip-file fileb://mongodb-layer.zip \
            --compatible-runtimes nodejs20.x \
            --region ${{ env.AWS_REGION }} \
            --query 'LayerVersionArn' \
            --output text)

          echo "✅ New layer ARN: $LAYER_ARN"
          echo ""

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Deploying functions"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FUNCTIONS="yormenops-posts yormenops-comments yormenops-health yormenops-seed"

          for FUNC in $FUNCTIONS; do
            echo ""
            echo "📦 Updating: $FUNC"
            
            echo "  → Updating code..."
            aws lambda update-function-code \
              --function-name "$FUNC" \
              --zip-file fileb://lambda.zip \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager > /dev/null
            
            echo "  → Waiting for code update..."
            aws lambda wait function-updated \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }}
            
            echo "  → Updating configuration..."
            aws lambda update-function-configuration \
              --function-name "$FUNC" \
              --layers "$LAYER_ARN" \
              --environment file:///tmp/lambda-env.json \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager > /dev/null
            
            echo "  → Waiting for configuration update..."
            aws lambda wait function-updated \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }}
            
            echo "  ✅ $FUNC updated successfully"
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 All functions deployed successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Verify deployments
        run: |
          echo "🔍 Verifying deployments..."
          echo ""
          
          FUNCTIONS="yormenops-posts yormenops-comments yormenops-health yormenops-seed"
          
          for FUNC in $FUNCTIONS; do
            echo "📋 $FUNC:"
            
            CONFIG=$(aws lambda get-function-configuration \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }} \
              --query '{Runtime: Runtime, MemorySize: MemorySize, Timeout: Timeout, LayerCount: Layers | length([*]), EnvironmentConfigured: Environment.Variables != null}' \
              --output json)
            
            echo "$CONFIG" | jq 'to_entries | map("  \(.key): \(.value)") | .[]' -r
            
            ENV_EXISTS=$(aws lambda get-function-configuration \
              --function-name "$FUNC" \
              --region ${{ env.AWS_REGION }} \
              --query 'Environment.Variables != null' \
              --output text)
            
            if [ "$ENV_EXISTS" = "True" ]; then
              echo "  ✅ Environment variables configured"
            else
              echo "  ⚠️ No environment variables found"
            fi
            
            echo ""
          done

      - name: Deploy summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🛸 YormenOps Lambda Deploy
          
          | Field | Value |
          |-------|-------|
          | **Image Tag (scan)** | `${{ env.IMAGE_TAG }}` |
          | **Region** | `us-east-2` |
          | **Functions** | posts, comments, health, seed |
          | **Deployment Type** | ZIP + Layer |
          | **Status** | ✅ **Deployed successfully** |
          
          ### 🔧 Configuration
          - `NODE_ENV`: prod
          - `MONGODB_URI`: ✅ Configured
          - `CORS_ORIGIN`: ✅ Configured
          - `AWS_NODEJS_CONNECTION_REUSE_ENABLED`: 1
          
          ---
          *Deployed via GitHub Actions* | `${{ github.sha }}`
          EOF

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ DEPLOYMENT FAILED"
          echo "Check the logs above for the exact error."
          exit 1
          


     
          

          
