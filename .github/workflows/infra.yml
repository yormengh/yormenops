name: Infrastructure — Terraform Plan & Apply

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION:     us-east-2
  TF_WORKING_DIR: infrastructure/environments/prod
  TF_VERSION:     1.7.4

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.ref == 'refs/heads/main' && github.event_name == 'push' && 'apply' || 'plan') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          cd ../../../lambda
          npm ci --production --prefer-offline
          zip -r lambda.zip src/ node_modules/ package.json --exclude "*.test.js" --exclude "src/local.js"
          cd layers/mongodb/nodejs && npm ci --prefer-offline && cd ..
          zip -r ../../../lambda/mongodb-layer.zip nodejs/

      - name: Whitelist GitHub Actions IP in Atlas
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "📍 Runner IP: $IP"
          
          ATLAS_KEY_ID="${{ secrets.ATLAS_KEY_ID }}"
          
          HTTP_CODE=$(curl -s -o /tmp/atlas_response.json -w "%{http_code}" \
            -u "${{ secrets.ATLAS_PUBLIC_KEY }}:${{ secrets.ATLAS_PRIVATE_KEY }}" \
            --digest \
            -H "Accept: application/vnd.atlas.2023-01-01+json" \
            -H "Content-Type: application/json" \
            -X POST "https://cloud.mongodb.com/api/atlas/v2/orgs/${{ secrets.ATLAS_ORG_ID }}/apiKeys/${ATLAS_KEY_ID}/accessList" \
            --data "[{\"ipAddress\":\"${IP}\",\"comment\":\"github-actions-${GITHUB_RUN_ID}\"}]")
          
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ IP whitelisted successfully"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "ℹ️ IP already whitelisted"
          else
            echo "⚠️ Failed to whitelist IP (HTTP $HTTP_CODE)"
          fi
          
          echo "⏳ Waiting for Atlas propagation..."
          sleep 15

      - name: Validate Terraform variables
        run: |
          echo "🔍 Validating Terraform variables..."
          
          if [ -z "${{ secrets.ATLAS_ORG_ID }}" ]; then
            echo "❌ Error: ATLAS_ORG_ID secret is not set"
            exit 1
          fi
          echo "✅ ATLAS_ORG_ID: configured"
          
          if [ -z "${{ secrets.ATLAS_PUBLIC_KEY }}" ]; then
            echo "❌ Error: ATLAS_PUBLIC_KEY secret is not set"
            exit 1
          fi
          echo "✅ ATLAS_PUBLIC_KEY: configured"
          
          if [ -z "${{ secrets.ATLAS_PRIVATE_KEY }}" ]; then
            echo "❌ Error: ATLAS_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "✅ ATLAS_PRIVATE_KEY: configured"
          
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "❌ Error: DB_PASSWORD secret is not set"
            exit 1
          fi
          echo "✅ DB_PASSWORD: configured"
          
          echo ""
          echo "✅ All required variables are configured"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          soft_fail: true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
          -var="mongodb_atlas_org_id=${{ secrets.ATLAS_ORG_ID }}" \
          -var="atlas_public_key=${{ secrets.ATLAS_PUBLIC_KEY }}" \
          -var="atlas_private_key=${{ secrets.ATLAS_PRIVATE_KEY }}" \
          -var="db_password=${{ secrets.DB_PASSWORD }}" \
          -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
          -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
          -var="seed_token=${{ secrets.SEED_TOKEN }}" \
          -var="acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}" \
          -var="mongodb_layer_zip_path=../../../lambda/mongodb-layer.zip" \
          -out=tfplan
        env:
         TF_VAR_region: us-east-2

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### 🏗️ Terraform Plan\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\`\n*By @${{ github.actor }}*`
            github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: output })

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Outputs
        if: github.ref == 'refs/heads/main'
        run: |
          echo "## 🏗️ YormenOps Infra Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY



          

